name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --quiet numpy
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Validate workflow YAML
        run: |
          python - <<'EOF'
          import sys, yaml, pathlib
          ok = True
          for p in sorted(pathlib.Path('.github/workflows').glob('*.yml')):
              try:
                  yaml.safe_load(p.read_text(encoding='utf-8'))
                  print(f'OK   {p}')
              except yaml.YAMLError as e:
                  print(f'FAIL {p}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          EOF
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  smoke:
    # End-to-end import sanity: numpy is the only heavy dep needed for
    # --help (sounddevice, pynput, faster_whisper are lazy-loaded inside
    # Dictate / __main__). If a future change re-couples them to import
    # time, this job fails on Windows + Linux before users see the
    # broken installer.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal deps
        # numpy: required at voice_pi import time. sounddevice +
        # faster_whisper stay lazy so they don't bloat the smoke job.
        run: python -m pip install --quiet numpy
      - name: Install pynput (Windows only)
        # pynput imports an X11/evdev backend on Linux which fails on
        # headless runners. We only need it for the probe-key step
        # which is Windows-only anyway.
        if: runner.os == 'Windows'
        run: python -m pip install --quiet pynput
      - name: voice_pi --help
        run: python voice_pi.py --help
      - name: probe-key.py sanity (returns 3 for unknown key)
        # pynput needs a display backend on Linux (Xlib / evdev); the
        # headless Ubuntu runner can't import it, and probe-key.py is
        # primarily a Windows-side tool (Pause/Break, caps_lock toggle
        # warnings, IME chord checks) so skip it there. The Windows
        # runner is the meaningful target.
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set +e
          python scripts/probe-key.py bogus_key 1
          rc=$?
          set -e
          if [ "$rc" != "3" ]; then
            echo "expected exit 3 (unknown key), got $rc"
            exit 1
          fi
