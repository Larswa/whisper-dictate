name: release

# Cut a release by pushing a version tag:
#   git tag v0.1.1 && git push origin v0.1.1
# (or run this workflow manually from the Actions tab with an existing
# tag). It builds the four platform bundles, generates release notes
# from the commit messages since the previous tag, appends the
# evergreen RELEASE_NOTES.md body, and publishes the GitHub Release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.1.1'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        run: |
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5   # v5 = Node 24 (v4/Node 20 is being removed)
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0          # full history + tags for the changelog

      - name: Sanity-check scripts
        run: |
          python3 -c "import ast; ast.parse(open('voice_pi.py').read())"
          bash -n setup.sh

      - name: Build bundles
        run: |
          set -e
          mkbundle() {   # $1 zip  $2 requirements-file  $3 launchers
            d=whisper-dictate; rm -rf "$d"; mkdir "$d"
            cp voice_pi.py vp_*.py README.md LICENSE "$d/"
            cp "$2" "$d/requirements.txt"
            for f in $3; do cp "$f" "$d/"; done
            [ -f "$d/setup.sh" ] && chmod +x "$d/setup.sh"
            zip -q -r "$1" "$d"; rm -rf "$d"
          }
          mkbundle "whisper-dictate-windows-nvidia-${VERSION}.zip" requirements-gpu.txt "setup.ps1 setup.cmd"
          mkbundle "whisper-dictate-windows-cpu-${VERSION}.zip"    requirements-cpu.txt "setup.ps1 setup.cmd"
          mkbundle "whisper-dictate-windows-amd-${VERSION}.zip"    requirements-cpu.txt "setup.ps1 setup.cmd"
          mkbundle "whisper-dictate-linux-cpu-${VERSION}.zip"      requirements-cpu.txt "setup.sh"

      - name: Generate release notes from commit messages
        run: |
          set -e
          PREV=$(git tag --sort=-v:refname | grep -vFx "$TAG" | head -n1 || true)
          {
            if [ -n "$PREV" ]; then
              echo "## Changes ($PREV → $TAG)"
              echo
              git log --no-merges --pretty='- %s (%h)' "$PREV..$TAG"
            else
              echo "## Changes"
              echo
              git log --no-merges --pretty='- %s (%h)' "$TAG"
            fi
            echo
            echo "---"
            echo
            cat RELEASE_NOTES.md
          } > NOTES.md
          echo "----- generated notes -----"; cat NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          assets=(
            "whisper-dictate-windows-nvidia-${VERSION}.zip"
            "whisper-dictate-windows-cpu-${VERSION}.zip"
            "whisper-dictate-windows-amd-${VERSION}.zip"
            "whisper-dictate-linux-cpu-${VERSION}.zip"
          )
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG — download, unzip, run" --notes-file NOTES.md
            gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG — download, unzip, run" --notes-file NOTES.md
          fi

      - name: Bump nix/package.nix version
        run: |
          set -e
          sed -i "s/version ? \"[^\"]*\"/version ? \"${VERSION}\"/" nix/package.nix
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nix/package.nix
          if git diff --cached --quiet; then
            echo "nix/package.nix already up to date."
            exit 0
          fi
          git commit -m "chore: bump nix/package.nix to ${VERSION}"
          # Rebase oven på main i tilfælde af parallelle pushes
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Bump Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set - skipping Homebrew tap bump."
            exit 0
          fi
          src="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          sha=$(curl -fsSL "$src" | sha256sum | cut -d' ' -f1)
          echo "source tarball sha256: $sha"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/FactusConsulting/homebrew-tap.git" tap
          f=tap/Formula/whisper-dictate.rb
          sed -i -E "s#(archive/refs/tags/)[^\"]+#\1${TAG}.tar.gz#" "$f"
          sed -i -E "s#^( *sha256 \")[a-f0-9]{64}#\1${sha}#" "$f"
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/whisper-dictate.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git commit -m "whisper-dictate ${VERSION}"
          git push origin HEAD:main
